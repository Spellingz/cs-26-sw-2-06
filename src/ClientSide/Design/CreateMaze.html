<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="VisualDesign.css">
    <link rel="stylesheet" href="NavigationBar.css">
    <title>CreateMaze</title>
</head>
<body>
    <div id="navBar">
        <div style="background-color: #000047; padding: 10px; width: 90%; height: 30px; border-radius: 12px;">
            <button onclick="location.href='Frontpage.html'" id="GoBackToPrevious" style="height: 30px; background-color: white; border: none; border-radius: 8px;">GO BACK</button>

            <button id="morepagbutton" onclick="more()" style="float: right; margin-right: 40px; height: 30px; background-color: white; border: none; border-radius: 8px;">MORE</button>
            <button id="aboutpagebutton" onclick="about()" style="float: right; margin-right: 40px; height: 30px; background-color: white; border: none; border-radius: 8px;">ABOUT</button>
            <button id="homepagebutton" onclick="location.href='Frontpage.html'" style="float: right; margin-right: 40px; height: 30px; background-color: white; border: none; border-radius: 8px;">HOME</button>
        </div>
        <div id= "navigationOutput"></div>
    </div>

    <h1 id="Header" style="text-shadow: 2px 2px #8896a2;">Create Maze</h1>

    <div id="wrapperFactors">
        <div class="Factors">
            <button id="Door" onclick="DoorParameter()" style="background-color: #d4e4f1; margin-left: 20px; height: 50px; width: 500px; border-color: #a1aeb8; border-radius: 12px; font-weight: bolder; font-size: large;">DOORS</button>
            <br><br>
            <button id="Size" onclick="SizeParameter()" style="background-color: #d4e4f1; margin-left: 20px; height: 50px; width: 500px; border-color: #a1aeb8; border-radius: 12px; font-weight: bolder; font-size: large;">SIZE</button>
            <br><br>
            <button id="Branches" onclick="BranchesParameter()" style="background-color: #d4e4f1; margin-left: 20px; height: 50px; width: 500px; border-color: #a1aeb8; border-radius: 12px; font-weight: bolder; font-size: large;">BRANCHES</button>
            <br><br>
            <button id="Loops" onclick="LoopsParameter()" style="background-color: #d4e4f1; margin-left: 20px; height: 50px; width: 500px; border-color: #a1aeb8; border-radius: 12px; font-weight: bolder; font-size: large;">LOOPS</button>
            <br><br>
            <button id="Straightness" onclick="StraightnessParameter()" style="background-color: #d4e4f1; margin-left: 20px; height: 50px; width: 500px; border-color: #a1aeb8; border-radius: 12px; font-weight: bolder; font-size: large;">STRAIGHTNESS</button>
        </div>
        <div id= "output"></div>
    </div>


    <div id="CreateBoks">
            <button class="CreateMazeButton"
            style="background-color: #4a6275; border-color: #303f4b; font-size: 20px; width: 200px; height: 50px; border-radius: 12px;"
            onclick="sendmazeinfo()">
                Create Maze
            </button>
    </div>

    <!--js files connection-->
    <script src="server.js"></script>
    <script src="FunctionParameters.js"></script>
    <script src="MoreAndAbout.js"></script>
    
</body>
</html>
