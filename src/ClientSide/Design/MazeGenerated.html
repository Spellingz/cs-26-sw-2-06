<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="VisualDesign.css">
    <link rel="stylesheet" href="NavigationBar.css">
    <link rel="stylesheet" href="modificationButtonDesign.css">
    <title>MazeGenerated</title>
</head>
<body>
     <div id="navBar">
        <div style="background-color: #000047; padding: 10px; width: 90%; height: 30px; border-radius: 12px;">
            <button onclick="location.href='CreateMaze.html'" id="GoBackToPrevious" style="height: 30px; background-color: white; border: none; border-radius: 8px;">GO BACK</button>

            <button id="morepagbutton" onclick="more()" style="float: right; margin-right: 40px; height: 30px; background-color: white; border: none; border-radius: 8px;">MORE</button>
            <button id="aboutpagebutton" onclick="about()" style="float: right; margin-right: 40px; height: 30px; background-color: white; border: none; border-radius: 8px;">ABOUT</button>
            <button id="homepagebutton" onclick="location.href='Frontpage.html'" style="float: right; margin-right: 40px; height: 30px; background-color: white; border: none; border-radius: 8px;">HOME</button>
        </div>
        <div id= "navigationOutput"></div>
    </div>

    <h1 id="Header" style="text-shadow: 2px 2px #8896a2; text-align: left; margin-left: 5%;">Maze Generator 2.0</h1>

     <div id="wrapperFactors">
         <div class="Factors" style="margin-left: 5%;">
             <h3 id="heatMapHeader" style="margin-top: -5%; text-align: left; color: #000047;">HEAT MAPS:</h3>
             <button id="Distance from Path" onclick="trapsHeatMap()" style="background-color: #d4e4f1; height: 50px; width: 500px; border-color: #a1aeb8; border-radius: 12px; font-weight: bolder; font-size: large;">DISTANCE FROM PATH</button>
             <br><br>
             <button id="Distance from Start or End" onclick="enemiesHeatMap()" style="background-color: #d4e4f1; height: 50px; width: 500px; border-color: #a1aeb8; border-radius: 12px; font-weight: bolder; font-size: large;">DISTANCE FROM START OR END</button>
             <br><br>
             <button id="Distance from Start" onclick="itemsHeatMap()" style="background-color: #d4e4f1; height: 50px; width: 500px; border-color: #a1aeb8; border-radius: 12px; font-weight: bolder; font-size: large;">DISTANCE FROM START</button>
             <br><br>
             <button id="Proximity to Path" onclick="doorsHeatMap()" style="background-color: #d4e4f1; height: 50px; width: 500px; border-color: #a1aeb8; border-radius: 12px; font-weight: bolder; font-size: large;">PROXIMITY TO PATH</button>
             <br><br>
             <button id="Proximity to Start or End" onclick="specialWallsHeatMap()" style="background-color: #d4e4f1; height: 50px; width: 500px; border-color: #a1aeb8; border-radius: 12px; font-weight: bolder; font-size: large;">PROXIMITY TO START OR END</button>
         </div>
         <div id= "output"></div>
     </div>

    <div id="modifi">
        <div id="ModificationButtons" style="margin-left: 5%;">
            <h3 id="ModificationHeader" style="text-align: left; color: #000047;">ACTIONS:</h3>
            <button class="CreateMazeButton" style="background-color: #4a6275; border-color: #303f4b; font-size: 20px; height: 50px; width: 166px; border-radius: 12px; color:#f0efeb;" onclick="sendmazeinfo()">CREATE NEW</button>
            <button id="Eksport" onclick="exsport()" style="background-color: #4a6275; border-color: #303f4b; font-size: 20px; width: 166px; height: 50px; border-radius: 12px; color: #f0efeb;">GET CODE</button>
            <button id="EditMode" onclick="editMode()" style="background-color: #d11010; border-color: #9f1010; font-size: 20px; width: 166px; height: 50px; border-radius: 12px; color: #f0efeb; cursor: pointer;">EDIT MODE</button>
        </div>
        <div id= "modificationOutput"></div>
    </div>

     <!--Connection to js.files-->
     <script src="FunctionMazeGenerated.js"></script>
     <script src="FunctionParameters.js"></script>
     <script src="MoreAndAbout.js"></script>
     <script src="server.js"></script>

    <div id="generatedOutput">
        <!--This is just to visualise the boks until the data is ready, then delete this below (ONLY "generatedBoks")-->
        <div id="generatedBoks">
            <canvas id="mazeCanvas" onclick="mouseClickEvent(event)"></canvas>
        </div>
        <script>
            document.addEventListener("DOMContentLoaded", visualizeMaze);
        </script>
    </div>
        
</body>
</html>
