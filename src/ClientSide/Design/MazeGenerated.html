<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="VisualDesign.css">
    <link rel="stylesheet" href="NavigationBar.css">
    <link rel="stylesheet" href="modificationButtonDesign.css">
    <title>MazeGenerated</title>
</head>
<body>
     <div id="navBar">
        <div style="background-color: #000047; padding: 10px; width: 90%; height: 30px; border-radius: 12px;">
            <button onclick="location.href='CreateMaze.html'" id="GoBackToPrevious" style="height: 30px; background-color: white; border: none; border-radius: 8px;">GO BACK</button>

            <button id="morepagbutton" onclick="more()" style="float: right; margin-right: 40px; height: 30px; background-color: white; border: none; border-radius: 8px;">MORE</button>
            <button id="aboutpagebutton" onclick="about()" style="float: right; margin-right: 40px; height: 30px; background-color: white; border: none; border-radius: 8px;">ABOUT</button>
            <button id="homepagebutton" onclick="location.href='Frontpage.html'" style="float: right; margin-right: 40px; height: 30px; background-color: white; border: none; border-radius: 8px;">HOME</button>
        </div>
        <div id= "navigationOutput"></div>
    </div>

    <h1 id="Header" style="text-shadow: 2px 2px #8896a2; text-align: left; margin-left: 5%;">Maze Generator 2.0</h1>

    <div id="wrapperFactors">
        <div class="Factors" style="margin-left: 5%;">
            <button id="Traps" onclick="trapsHeatMap()" style="background-color: #d4e4f1; height: 50px; width: 500px; border-color: #a1aeb8; border-radius: 12px; font-weight: bolder; font-size: large;">TRAPS</button>
            <br><br>
            <button id="Enemies" onclick="enemiesHeatMap()" style="background-color: #d4e4f1; height: 50px; width: 500px; border-color: #a1aeb8; border-radius: 12px; font-weight: bolder; font-size: large;">ENEMIES</button>
            <br><br>
            <button id="Items" onclick="itemsHeatMap()" style="background-color: #d4e4f1; height: 50px; width: 500px; border-color: #a1aeb8; border-radius: 12px; font-weight: bolder; font-size: large;">ITEMS</button>
            <br><br>
            <button id="Doors" onclick="doorsHeatMap()" style="background-color: #d4e4f1; height: 50px; width: 500px; border-color: #a1aeb8; border-radius: 12px; font-weight: bolder; font-size: large;">DOORS</button>
            <br><br>
            <button id="SpecialWalls" onclick="specialWallsHeatMap()" style="background-color: #d4e4f1; height: 50px; width: 500px; border-color: #a1aeb8; border-radius: 12px; font-weight: bolder; font-size: large;">"SPECIAL" WALLS</button>
        </div>
        <div id= "output"></div>
    </div>

    <div id="modifi">
        <div id="ModificationButtons" style="margin-left: 5%;">
            <button id="EditMode" onclick="editMode()" style="background-color: #4a6275; border-color: #303f4b; font-size: 20px; width: 250px; height: 50px; border-radius: 12px; color: #f0efeb;">EDIT MODE</button>
            <button id="Eksport" onclick="exsport()" style="background-color: #4a6275; border-color: #303f4b; font-size: 20px; width: 250px; height: 50px; border-radius: 12px; color: #f0efeb;">GET CODE</button>
        </div>
        <div id= "modificationOutput"></div>
    </div>

    <div id="generatedOutput">
        <!--This is just to visualise the boks until the data is ready, then delete this below (ONLY "generatedBoks")-->
        <canvas id="mazeCanvas" width=${boxWidth} height=${boxHeight} style="border:3px solid #000000;">></canvas>


        <div id="generatedBoks"></div>
    </div>

    <!--Connection to js.files-->
    <script src="FunctionParameters.js"></script>
    <script src="FunctionMazeGenerated.js"></script>
    <script src="MoreAndAbout.js"></script>
    <script src="server.js"></script>
        
</body>
</html>
